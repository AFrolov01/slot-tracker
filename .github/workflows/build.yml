name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: DIAGNOSTIC - Check files
      run: |
        echo "=== Current directory ==="
        pwd
        ls -la
        echo "=== Find all gradle files ==="
        find . -name "*.gradle" -o -name "*.gradle.kts" -o -name "gradlew"
        echo "=== Check settings.gradle ==="
        cat settings.gradle 2>/dev/null || echo "NO settings.gradle"
        echo "=== Check root build.gradle ==="
        cat build.gradle 2>/dev/null || echo "NO build.gradle"
        echo "=== Check app/build.gradle ==="
        cat app/build.gradle 2>/dev/null || echo "NO app/build.gradle"
        echo "=== Check AndroidManifest ==="
        cat app/src/main/AndroidManifest.xml 2>/dev/null || echo "NO AndroidManifest"

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.2

    - name: Build APK
      run: |
        echo "=== Starting build ==="
        gradle wrapper --gradle-version 8.2 || true
        gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 5
