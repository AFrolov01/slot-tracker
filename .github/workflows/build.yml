name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: DIAGNOSTIC - Check files
      run: |
        echo "=== Current directory ==="
        pwd
        ls -la
        echo "=== gradle/wrapper contents ==="
        ls -la gradle/wrapper/ 2>/dev/null || echo "NO gradle/wrapper"
        echo "=== Check gradlew executable ==="
        test -x gradlew && echo "gradlew is executable" || echo "gradlew NOT executable"
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Download missing gradle-wrapper.jar
      run: |
        mkdir -p gradle/wrapper
        wget -q https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar -O gradle/wrapper/gradle-wrapper.jar
        ls -la gradle/wrapper/
        
    - name: Make gradlew executable and build
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 5
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 5
