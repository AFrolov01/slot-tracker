name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: DIAGNOSTIC - Check files
      run: |
        echo "=== Current directory ==="
        pwd
        ls -la
        echo "=== gradle/wrapper contents ==="
        ls -la gradle/wrapper/ 2>/dev/null || echo "NO gradle/wrapper"
        echo "=== Check if gradlew exists ==="
        test -f gradlew && echo "gradlew exists" || echo "NO gradlew"
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Install Gradle and generate wrapper
      run: |
        # Скачиваем Gradle 8.2 напрямую
        wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
        unzip -q gradle-8.2-bin.zip
        export PATH=$PWD/gradle-8.2/bin:$PATH
        gradle --version
        # Генерируем wrapper (создаст gradle-wrapper.jar)
        gradle wrapper --gradle-version 8.2
        ls -la gradle/wrapper/
        
    - name: Build APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 5
